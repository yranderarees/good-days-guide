<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Good Days Guide</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="wrap">

    <section class="hero">
      <div class="small">The Good Days Guide</div>

      <h1 id="greeting">Good morning, Dad! ☀️</h1>

      <p>
        I love you.
        <br><br>
        Thank you for looking after yourself today.
        <br>
        We all benefit.
        <br><br>
        What will it be?
      </p>
    </section>

    <section class="grid">

      <button class="card sleep" data-section="rest">
        💤 Rest Well
        <span>Energy & Recovery</span>
      </button>

      <button class="card food" data-section="food">
        🍽️ Eat Well
        <span>Energy & Strength</span>
      </button>

      <button class="card body" data-section="body">
        🧠🚶 Use Your Body
        <span>Functionality</span>
      </button>

      <button class="card connect" data-section="connect">
        ❤️ Connect
        <span>Companionship & Meaning</span>
      </button>

    </section>

    <section id="panel" class="panel">
      <h2 id="title"></h2>
      <p id="intro"></p>

      <div id="list"></div>

      <div id="affirm">
        ❤️ Great choice, Dad.
        <br>
        <small>
          Every small choice is an investment in tomorrow.
        </small>
      </div>
    </section>

    <p class="footer">
      One good day. Then another. ❤️
    </p>

  </main>

  <script src="app.js"></script>
</body>
</html>
